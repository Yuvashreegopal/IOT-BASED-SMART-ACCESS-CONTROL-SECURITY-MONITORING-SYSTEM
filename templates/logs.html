<!DOCTYPE html>
<html>
<head>
    <title>Access Logs</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 30px;
        }

        h1 {
            color: #38bdf8;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #1e293b;
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: #020617;
            color: #38bdf8;
            padding: 12px;
        }

        td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #334155;
        }

        tr:hover {
            background: #334155;
        }

        .granted {
            color: #22c55e;
            font-weight: bold;
        }

        .denied {
            color: #ef4444;
            font-weight: bold;
        }

        a {
            color: #38bdf8;
            text-decoration: none;
        }
    </style>
</head>
<body>

<h1>📜 Access Logs</h1>

<table>
    <tr>
        <th>Name</th>
        <th>UID</th>
        <th>Status</th>
        <th>Time</th>
    </tr>

    {% for log in logs %}
    <tr>
        <td>{{ log[0] }}</td>   <!-- Name -->
        <td>{{ log[1] }}</td>   <!-- UID -->
        <td class="{{ log[2]|lower }}">{{ log[2] }}</td> <!-- Status -->
        <td>{{ log[3] }}</td>   <!-- Time -->
    </tr>
    {% endfor %}
</table>

<br><br>
<a href="/dashboard">⬅ Back to Dashboard</a>

</body>
</html>
